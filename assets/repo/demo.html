<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>miri demo</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0d1117;
        color: #f0f6fc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(88, 166, 255, 0.14), transparent 36rem),
          #0d1117;
      }

      main {
        width: min(1200px, calc(100vw - 32px));
        padding: 24px 0;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(24px, 4vw, 40px);
        font-weight: 700;
        text-align: center;
      }

      video {
        display: block;
        width: 100%;
        max-height: calc(100vh - 140px);
        border: 1px solid rgba(240, 246, 252, 0.16);
        border-radius: 12px;
        background: #000;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      p {
        margin: 16px 0 0;
        color: #8b949e;
        text-align: center;
      }

      a {
        color: #58a6ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>miri demo</h1>
      <video
        src="https://media.githubusercontent.com/media/dimixar/miri/main/assets/repo/miri-demo.mp4"
        controls
        autoplay
        muted
        loop
        playsinline
      >
        <a href="https://media.githubusercontent.com/media/dimixar/miri/main/assets/repo/miri-demo.mp4">Watch the demo video</a>
      </video>
      <p>
        If the video does not load,
        <a href="https://media.githubusercontent.com/media/dimixar/miri/main/assets/repo/miri-demo.mp4">open it directly</a>.
      </p>
    </main>
  </body>
</html>
